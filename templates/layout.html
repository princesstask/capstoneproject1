<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBO Simulator & Learning Platform</title>
    <!-- Menghubungkan CSS global -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Navigasi Utama Aplikasi -->
    <nav class="navbar">
        <a href="/" class="brand" style="font-size: 1.4rem; margin-left: 0; letter-spacing: 1px;">
            <strong style="color: var(--secondary-color);">TBO</strong>-Platform
        </a>
        <div class="nav-links">
            <a href="/" class="nav-item">Home</a>
            <a href="/fsa" class="nav-item">FSA Module</a>
            <a href="/regex" class="nav-item">Regular Expression</a>
            <a href="/pda" class="nav-item">PDA Module</a>
            <a href="/chomsky" class="nav-item">Chomsky Module</a>
        </div>
    </nav>

    <!-- Blok Konten Dinamis yang Akan Diisi oleh Halaman Anak -->
    <main style="min-height: 70vh;">
        {% block content %}{% endblock %}
    </main>

    <!-- Informasi Kaki Halaman Sesuai Standar Akademik Proyek -->
    <footer>
        <p><strong>Captsone Project - Teori Bahasa dan Otomata</strong></p>
    </footer>

</body>
</html>
